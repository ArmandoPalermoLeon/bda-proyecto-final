{% extends "base.html" %}

{% block title %}Vincular nuevo dispositivo{% endblock %}
{% block page_title %}Vincular nuevo dispositivo{% endblock %}
{% block breadcrumb %}
    Inicio /
    <a href="{{ url_for('dispositivos') }}" style="color:#185fa5;">Dispositivos</a> /
    Nuevo
{% endblock %}

{% block content %}

<div style="max-width:680px;">
    <div class="card">
        <div class="card-header">
            <div class="card-title">Registrar dispositivo</div>
        </div>

        <div class="card-body">
            <form method="POST" action="{{ url_for('dispositivos_nuevo') }}">

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="codigo">Código del dispositivo</label>
                        <input type="text"
                               id="codigo"
                               name="codigo"
                               class="form-control"
                               placeholder="Ej. GPS-406"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="tipo">Tipo</label>
                        <select id="tipo" name="tipo" class="form-control" required>
                            <option value="" disabled selected>Seleccionar tipo...</option>
                            <option value="Pulsera GPS Tracker">Pulsera GPS Tracker</option>
                            <option value="Collar GPS">Collar GPS</option>
                            <option value="Beacon Habitación">Beacon Habitación</option>
                            <option value="Sensor NFC Medicación">Sensor NFC Medicación</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="id_paciente">Paciente asignado</label>
                    <select id="id_paciente" name="id_paciente" class="form-control" required>
                        <option value="" disabled selected>Seleccionar paciente...</option>
                        {% for p in pacientes %}
                        <option value="{{ p.id_paciente }}">
                            {{ p.nombre_paciente }} {{ p.apellido_p_pac }} {{ p.apellido_m_pac }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="bateria">Batería inicial (%)</label>
                        <input type="number"
                               id="bateria"
                               name="bateria"
                               class="form-control"
                               min="0" max="100"
                               placeholder="Ej. 100"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="estatus">Estatus</label>
                        <select id="estatus" name="estatus" class="form-control" required>
                            <option value="" disabled selected>Seleccionar estatus...</option>
                            <option value="Activo / Transmitiendo">Activo / Transmitiendo</option>
                            <option value="Cargando">Cargando</option>
                            <option value="Batería crítica">Batería crítica</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Vincular dispositivo
                    </button>
                    <a href="{{ url_for('dispositivos') }}" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
