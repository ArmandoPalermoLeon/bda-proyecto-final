{% extends "base.html" %}

{% block title %}Agregar zona segura{% endblock %}
{% block page_title %}Agregar zona segura{% endblock %}
{% block breadcrumb %}
    Inicio /
    <a href="{{ url_for('zonas') }}" style="color:#185fa5;">Zonas Seguras</a> /
    Nueva
{% endblock %}

{% block content %}

<div style="max-width:680px;">
    <div class="card">
        <div class="card-header">
            <div class="card-title">Configurar nueva zona segura</div>
        </div>

        <div class="card-body">
            <form method="POST" action="{{ url_for('zonas_nueva') }}">

                <div class="form-group">
                    <label class="form-label" for="nombre_zona">Nombre de la zona</label>
                    <input type="text"
                           id="nombre_zona"
                           name="nombre_zona"
                           class="form-control"
                           placeholder="Ej. Jardín trasero"
                           required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="id_paciente">Paciente</label>
                    <select id="id_paciente" name="id_paciente" class="form-control" required>
                        <option value="" disabled selected>Seleccionar paciente...</option>
                        <option value="0">Todos los pacientes</option>
                        {% for p in pacientes %}
                        <option value="{{ p.id_paciente }}">
                            {{ p.nombre_paciente }} {{ p.apellido_p_pac }} {{ p.apellido_m_pac }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label" for="radio_metros">Radio permitido (metros)</label>
                        <input type="number"
                               id="radio_metros"
                               name="radio_metros"
                               class="form-control"
                               min="1"
                               placeholder="Ej. 30"
                               required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="notificar_a">Notificar a</label>
                        <input type="text"
                               id="notificar_a"
                               name="notificar_a"
                               class="form-control"
                               placeholder="Ej. Cuidador primario"
                               required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                        Guardar zona
                    </button>
                    <a href="{{ url_for('zonas') }}" class="btn btn-secondary">Cancelar</a>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
